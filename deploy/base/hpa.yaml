# TODO(step_03_task02): HPA drives pod count; large CPU requests drive node autoscale.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: genai-api
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: genai-api }
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
