# Local-only observability stack — mirrors the Azure-native one (Managed Prometheus
# + Managed Grafana) on your laptop, so you can screen-record real charts of the same
# /metrics the app exposes. NOT used in prod (Azure scrapes the same endpoint there).
#
#   1) run the app on the host:   make run         (serves :8000/metrics)
#   2) start this stack:          make obs-up      (or: docker compose -f this up -d)
#   3) open Grafana:              http://localhost:3000  (admin / admin)
#      the "LLMOps — Tokens, Cost, Latency" dashboard is pre-provisioned
#   4) stop:                      make obs-down
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: llmops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container scrape the host app

  grafana:
    image: grafana/grafana:latest
    container_name: llmops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"        # no login needed for the demo
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
