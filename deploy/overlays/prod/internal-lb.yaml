# prod only: expose genai-api via an AKS INTERNAL load balancer pinned to the static IP
# that the Application Gateway backend points at (infra var internal_lb_ip = 10.224.0.250).
# Local (kind) keeps the plain ClusterIP from base — this patch applies in the prod overlay only.
apiVersion: v1
kind: Service
metadata:
  name: genai-api
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-ipv4: "10.224.0.250"
spec:
  type: LoadBalancer
