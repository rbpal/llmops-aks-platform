apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod
resources:
  - ../../base

# AKS pulls the image from ACR (not the local build tag). login server = <acr_name>.azurecr.io;
# acr_name = acrllmops<name_suffix> — update if you change name_suffix in tfvars.
images:
  - name: llmops-genai
    newName: acrllmopsrbpal.azurecr.io/llmops-genai
    newTag: v1

# Pin the genai-api Service to the internal LB IP the App Gateway backend targets.
patches:
  - path: internal-lb.yaml
