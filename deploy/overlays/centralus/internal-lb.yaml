# centralus: internal LB pinned to the App Gateway backend IP
# (infra-dr regions.centralus.internal_lb_ip = 10.20.2.250).
apiVersion: v1
kind: Service
metadata:
  name: genai-api
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-ipv4: "10.20.2.250"
spec:
  type: LoadBalancer
