# eastus2: expose genai-api via an internal LB pinned to the App Gateway backend IP
# (infra-dr regions.eastus2.internal_lb_ip = 10.10.2.250).
apiVersion: v1
kind: Service
metadata:
  name: genai-api
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    service.beta.kubernetes.io/azure-load-balancer-ipv4: "10.10.2.250"
spec:
  type: LoadBalancer
