# Workload-identity ServiceAccount. client-id = uami-openai-rbpal (rg-openai-api-rbpal), which
# holds "Cognitive Services OpenAI User" on oai-rbpal-eastus (account-scoped → covers chat +
# embeddings). Reused across both regions for this demo. STILL REQUIRED at apply time: a
# federated identity credential on this UAMI trusting THIS cluster's AKS OIDC issuer for
# subject system:serviceaccount:prod:genai-api (each region's cluster has its own issuer URL).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: genai-api
  namespace: prod
  annotations:
    azure.workload.identity/client-id: "1386a775-eef5-4d21-96c2-ef1b01b11661"
