name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  eval-gate:
    runs-on: ubuntu-latest
    env:
      USE_STUB_LLM: "true"
      VECTOR_STORE: "faiss"
      VAULT_BACKEND: "local"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run python -m app.rag.ingest
      - run: uv run pytest -q
      - run: uv run python -m eval.run_eval
